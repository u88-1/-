<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>מרכז הלמידה - המהפך התודעתי</title>
    <style>
        :root { --bg: #0f172a; --glass: rgba(30, 41, 59, 0.7); --accent: #6366f1; --text: #f8fafc; }
        body { font-family: 'Assistant', sans-serif; background: linear-gradient(135deg, var(--bg), #1e293b); color: var(--text); margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .main-card { max-width: 900px; width: 100%; background: var(--glass); backdrop-filter: blur(15px); padding: 50px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 25px 50px rgba(0,0,0,0.3); text-align: center; }
        
        /* אזורים מוסתרים */
        #video-section, #contact-section { display: none; }
        
        /* פופ-אפ */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: #1e293b; padding: 40px; border-radius: 25px; width: 90%; max-width: 450px; text-align: center; border: 1px solid var(--accent); }
        
        .btn-main { width: 100%; padding: 18px; background: var(--accent); color: white; border: none; border-radius: 12px; cursor: pointer; font-size: 1.2rem; font-weight: bold; margin-top: 15px; transition: 0.3s; }
        .btn-main:hover { filter: brightness(1.2); }
        input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 10px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.2); color: white; box-sizing: border-box; }
        
        .video-container { width: 100%; margin-top: 20px; border-radius: 20px; overflow: hidden; border: 1px solid rgba(255,255,255,0.2); background: #000; }
        .video-container iframe { width: 100%; aspect-ratio: 16 / 9; display: block; }
    </style>
</head>
<body>

<div class="main-card">
    <div id="landing-page">
        <h1 style="font-size: 2.8rem; line-height: 1.2;">הכוח לשנות את המציאות שלך נמצא כבר אצלך בידיים.</h1>
        <p style="font-size: 1.4rem; opacity: 0.9; margin: 30px 0;">זה הזמן להפסיק לחיות "על אוטומט" ולהתחיל לברוא את החיים שאתה באמת ראוי להם.</p>
        <button class="btn-main" onclick="openModal()">כניסה לקורס</button>
    </div>

    <div id="video-section">
        <h2 style="margin-top:0;">צפייה נעימה!</h2>
        <div class="video-container">
            <iframe src="https://www.youtube.com/embed/Lo2Uw67O8XY" allowfullscreen></iframe>
        </div>
        <button class="btn-main" style="background:#475569;" onclick="location.reload()">סיום צפייה</button>
    </div>
</div>

<div id="myModal" class="modal">
    <div class="modal-content">
        <h2 id="modal-title">בקשת גישה</h2>
        <div id="step-contact">
            <p>השאר פרטים ונשלח לך קוד גישה:</p>
            <form action="https://formspree.io/f/xzdjzneb" method="POST">
                <input type="text" name="name" placeholder="שם מלא" required>
                <input type="email" name="email" placeholder="אימייל" required>
                <button type="submit" class="btn-main" style="background:#22c55e;">שלח בקשה</button>
            </form>
            <button class="btn-main" style="background:transparent; border:1px solid white;" onclick="showLogin()">יש לי כבר קוד!</button>
        </div>
        <div id="step-login" style="display:none;">
            <p>הזן את הקוד שקיבלת:</p>
            <input type="password" id="pass-code" placeholder="הקוד הסודי">
            <button class="btn-main" onclick="checkPassword()">צפייה בשיעור</button>
        </div>
    </div>
</div>

<script>
function openModal() { document.getElementById('myModal').style.display = 'flex'; }
function showLogin() { 
    document.getElementById('step-contact').style.display = 'none'; 
    document.getElementById('step-login').style.display = 'block';
    document.getElementById('modal-title').innerText = "הזן קוד גישה";
}
function checkPassword() {
    if (document.getElementById('pass-code').value == "12345") {
        document.getElementById('myModal').style.display = 'none';
        document.getElementById('landing-page').style.display = 'none';
        document.getElementById('video-section').style.display = 'block';
    } else { alert("קוד שגוי"); }
}
</script>
</body>
</html>
