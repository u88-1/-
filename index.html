<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מרכז הלמידה הדיגיטלי</title>
    <style>
        :root { --bg: #0f172a; --glass: rgba(30, 41, 59, 0.7); --accent: #6366f1; --text: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, var(--bg), #1e293b); color: var(--text); margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        
        .main-card { max-width: 800px; width: 100%; background: var(--glass); backdrop-filter: blur(15px); padding: 40px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 25px 50px rgba(0,0,0,0.3); text-align: center; }
        
        .syllabus { list-style: none; padding: 0; margin: 30px 0; text-align: right; }
        .syllabus li { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); font-size: 1.1rem; }
        
        .btn-main { width: 100%; padding: 18px; background: var(--accent); color: white; border: none; border-radius: 12px; cursor: pointer; font-size: 1.2rem; font-weight: bold; transition: 0.3s; }
        
        /* אזורים מוסתרים */
        #login-overlay, #video-section, #contact-section { display: none; margin-top: 30px; }
        
        .video-box { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; background: #000; border-radius: 15px; margin-top: 20px; }
        .video-box iframe { position: absolute; width: 100%; height: 100%; border: none; }
        
        input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 10px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.2); color: white; }
    </style>
</head>
<body>

<div class="main-card">
    <div id="landing-page">
        <h1>ברוכים הבאים לקורס ביטחון ואמונה</h1>
        <ul class="syllabus">
            <li>✅ מודול 1: כוחה של מחשבה</li>
            <li>✅ מודול 2: יסודות האמונה</li>
            <li>✅ מודול 3: בניית מציאות אישית</li>
        </ul>
        <button class="btn-main" onclick="showSection('login-overlay')">כניסה לקורס</button>
        <p style="margin-top:20px; opacity:0.7;">אין לך קוד? <a href="#" onclick="showSection('contact-section')" style="color:var(--accent)">לחץ כאן לבקשת גישה</a></p>
    </div>

    <div id="login-overlay">
        <h3>הזן קוד גישה</h3>
        <input type="password" id="pass-code" placeholder="הקוד הסודי שלך">
        <button class="btn-main" onclick="checkPassword()">צפה בשיעור</button>
    </div>

    <div id="video-section">
        <h3>צפייה מהנה!</h3>
        <div class="video-box">
            <iframe src="https://www.youtube.com/embed/Lo2Uw67O8XY" allowfullscreen></iframe>
        </div>
        <button class="btn-main" style="margin-top:20px; background:#ef4444;" onclick="location.reload()">סגור וצא</button>
    </div>

    <div id="contact-section">
        <h3>בקשת קוד גישה</h3>
        <form action="https://formspree.io/f/xzdjzneb" method="POST">
            <input type="text" name="name" placeholder="שם מלא" required>
            <input type="email" name="email" placeholder="אימייל" required>
            <button type="submit" class="btn-main" style="background:#22c55e;">שלח בקשה</button>
        </form>
    </div>
</div>

<script>
function showSection(id) {
    document.getElementById('landing-page').style.display = 'none';
    document.getElementById('login-overlay').style.display = 'none';
    document.getElementById('video-section').style.display = 'none';
    document.getElementById('contact-section').style.display = 'none';
    document.getElementById(id).style.display = 'block';
}
function checkPassword() {
    if (document.getElementById('pass-code').value == "אני רוצה ללמוד") {
        showSection('video-section');
    } else {
        alert("קוד שגוי");
    }
}
</script>
</body>
</html>
