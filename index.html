<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>מרכז הלמידה - סילבוס</title>
    <style>
        :root { --bg: #0f172a; --glass: rgba(30, 41, 59, 0.8); --accent: #6366f1; --text: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, var(--bg), #1e293b); color: var(--text); margin: 0; padding: 20px; }
        .main-card { max-width: 900px; margin: 50px auto; background: var(--glass); backdrop-filter: blur(10px); padding: 40px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.1); }
        
        /* פופ-אפ (Modal) */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); align-items: center; justify-content: center; }
        .modal-content { background: #1e293b; padding: 30px; border-radius: 20px; width: 90%; max-width: 400px; text-align: center; }
        
        .btn-main { width: 100%; padding: 15px; background: var(--accent); color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #444; background: #0f172a; color: white; box-sizing: border-box; }
        .syllabus-img { width: 100%; border-radius: 15px; }
    </style>
</head>
<body>

<div class="main-card">
    <h1>סילבוס הקורס המלא</h1>
    <img src="mysyllabus.jpg" alt="סילבוס" class="syllabus-img">
    <button class="btn-main" onclick="openModal()">כניסה לקורס</button>
</div>

<div id="myModal" class="modal">
    <div class="modal-content">
        <h2 id="modal-title">בקשת גישה</h2>
        <div id="step-contact">
            <p>השאר פרטים ונשלח לך קוד גישה:</p>
            <form action="https://formspree.io/f/xzdjzneb" method="POST">
                <input type="text" name="name" placeholder="שם מלא" required>
                <input type="email" name="email" placeholder="אימייל" required>
                <button type="submit" class="btn-main" style="background:#22c55e;">שלח בקשה</button>
            </form>
            <button class="btn-main" style="background:transparent; border:1px solid white;" onclick="showLogin()">יש לי כבר קוד!</button>
        </div>

        <div id="step-login" style="display:none;">
            <p>הזן את הקוד שקיבלת:</p>
            <input type="password" id="pass-code" placeholder="הכנס קוד">
            <button class="btn-main" onclick="checkPassword()">צפייה בשיעור</button>
        </div>
    </div>
</div>

<script>
function openModal() { document.getElementById('myModal').style.display = 'flex'; }
function showLogin() { 
    document.getElementById('step-contact').style.display = 'none'; 
    document.getElementById('step-login').style.display = 'block';
    document.getElementById('modal-title').innerText = "הזן קוד גישה";
}
function checkPassword() {
    if (document.getElementById('pass-code').value == "12345") {
        window.location.href = "https://www.youtube.com/embed/Lo2Uw67O8XY"; // כאן תוכל להפנות לדף צפייה
    } else {
        alert("קוד שגוי");
    }
}
</script>
</body>
</html>
