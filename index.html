<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>המהפך התודעתי</title>
    <style>
        :root { 
            --gradient: linear-gradient(135deg, #FF9A8B 0%, #FF6A88 50%, #FF99AC 100%);
            --bg: #1a1a2e;
        }
        body { 
            font-family: 'Assistant', sans-serif; 
            background: linear-gradient(to bottom right, #1a1a2e, #16213e); 
            color: #ffffff; 
            margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; 
        }
        
        .main-card { 
            max-width: 800px; width: 100%; background: rgba(255,255,255,0.05); backdrop-filter: blur(20px); 
            padding: 60px; border-radius: 40px; border: 2px solid rgba(255,255,255,0.1); 
            box-shadow: 0 30px 60px rgba(0,0,0,0.5); text-align: center; 
        }
        
        .btn-main { 
            width: 100%; padding: 20px; background: var(--gradient); color: white; border: none; 
            border-radius: 50px; cursor: pointer; font-size: 1.3rem; font-weight: 800; 
            box-shadow: 0 10px 20px rgba(255, 94, 98, 0.3); transition: 0.4s; 
        }
        .btn-main:hover { transform: scale(1.05); }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: #ffffff; color: #333; padding: 40px; border-radius: 30px; width: 90%; max-width: 400px; text-align: center; }
        
        input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 15px; border: 2px solid #ddd; box-sizing: border-box; }
        
        #video-section { display: none; }
        .video-container { width: 100%; margin-top: 20px; border-radius: 25px; overflow: hidden; border: 5px solid #fff; aspect-ratio: 16/9; }
        iframe { width: 100%; height: 100%; }
    </style>
</head>
<body>

<div class="main-card">
    <div id="landing-page">
        <h1 style="font-size: 3.5rem; margin-bottom: 20px; background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">הכוח לשנות הכל בידיים שלך</h1>
        <p style="font-size: 1.5rem; opacity: 0.9; margin-bottom: 40px;">מסע של אמונה, עוצמה פנימית ופריצת גבולות.</p>
        <button class="btn-main" onclick="openModal()">בוא נתחיל במסע!</button>
    </div>

    <div id="video-section">
        <h2 style="font-size: 2rem;">צפייה נעימה!</h2>
        <div class="video-container">
            <iframe src="https://www.youtube.com/embed/Lo2Uw67O8XY" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
        </div>
        <button class="btn-main" style="margin-top: 30px; background: #22c55e;" onclick="location.reload()">הבא: לפרק הבא &rarr;</button>
    </div>
</div>

<div id="myModal" class="modal">
    <div class="modal-content">
        <h2 id="modal-title">הצטרף למסע</h2>
        <div id="step-contact">
            <form action="https://formspree.io/f/xzdjzneb" method="POST">
                <input type="text" name="name" placeholder="שם מלא" required>
                <input type="email" name="email" placeholder="אימייל" required>
                <button type="submit" class="btn-main">שלח בקשת גישה</button>
            </form>
            <button class="btn-main" style="background:#666; margin-top:10px;" onclick="showLogin()">יש לי כבר קוד!</button>
        </div>
        <div id="step-login" style="display:none;">
            <input type="password" id="pass-code" placeholder="הכנס את הקוד הסודי">
            <button class="btn-main" onclick="checkPassword()">צפייה בשיעור</button>
        </div>
    </div>
</div>

<script>
    function openModal() { document.getElementById('myModal').style.display = 'flex'; }
    function showLogin() { 
        document.getElementById('step-contact').style.display = 'none'; 
        document.getElementById('step-login').style.display = 'block'; 
        document.getElementById('modal-title').innerText = "הזן קוד גישה";
    }
    function checkPassword() {
        if (document.getElementById('pass-code').value == "12345") {
            document.getElementById('myModal').style.display = 'none';
            document.getElementById('landing-page').style.display = 'none';
            document.getElementById('video-section').style.display = 'block';
        } else { alert("קוד שגוי"); }
    }
</script>
</body>
</html>
