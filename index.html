<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מרכז הלמידה הדיגיטלי</title>
    <style>
        :root { --primary: #2c3e50; --accent: #27ae60; --bg: #f8f9fa; }
        body { font-family: sans-serif; background-color: var(--bg); margin: 0; padding: 20px; line-height: 1.6; }
        .main-container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .video-box { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; background: #000; border-radius: 10px; margin-top: 20px; }
        .video-box iframe { position: absolute; width: 100%; height: 100%; border: none; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: var(--accent); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="main-container">
    <h1>אזור צפייה בשיעורים</h1>

    <div id="login-box">
        <p>הזן קוד גישה כדי לצפות בשיעור:</p>
        <input type="password" id="user-pass" placeholder="הכנס קוד">
        <button onclick="checkPassword()">צפה בשיעור</button>
    </div>

    <div id="video-area" style="display:none;">
        <p>שלום! הנה השיעור שלך:</p>
        <div class="video-box">
            <iframe src="https://www.youtube.com/embed/Lo2Uw67O8XY" allowfullscreen></iframe>
        </div>
        <button onclick="location.reload()" style="background:#dc3545; margin-top:20px;">יציאה (נעילת הסרטון)</button>
    </div>
</div>

<script>
function checkPassword() {
    var pass = document.getElementById("user-pass").value;
    // כאן אתה מגדיר את הקוד שאתה רוצה
    if (pass == "1212") { 
        document.getElementById("video-area").style.display = "block";
        document.getElementById("login-box").style.display = "none";
    } else {
        alert("קוד שגוי, נסה שנית");
    }
}
</script>

</body>
</html>
